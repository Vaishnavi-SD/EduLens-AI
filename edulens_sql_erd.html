
<div id="erd" style="padding: 0.5rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e3a5f' : '#E6F1FB',
    primaryTextColor: dark ? '#B5D4F4' : '#0C447C',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  STUDENTS {
    int student_id PK
    string name
    string email
    int age
    string learning_style
    date enrollment_date
    float baseline_score
  }
  COURSES {
    int course_id PK
    string course_name
    string subject
    string difficulty_level
    int total_modules
  }
  ENROLLMENTS {
    int enrollment_id PK
    int student_id FK
    int course_id FK
    date enrolled_on
    float progress_pct
    string status
  }
  LEARNING_SESSIONS {
    int session_id PK
    int student_id FK
    int course_id FK
    datetime session_start
    datetime session_end
    int duration_minutes
    int module_number
  }
  COGNITIVE_EVENTS {
    int event_id PK
    int session_id FK
    datetime event_time
    string state_detected
    float confidence_score
    string frame_reference
  }
  ASSESSMENTS {
    int assessment_id PK
    int student_id FK
    int course_id FK
    datetime taken_at
    float score
    int attempts
    string outcome
  }
  RISK_SCORES {
    int risk_id PK
    int student_id FK
    int course_id FK
    date scored_on
    float dropout_probability
    string risk_level
    string trigger_factors
  }
  LEARNING_PATHS {
    int path_id PK
    int student_id FK
    int course_id FK
    datetime generated_at
    string path_type
    string recommended_modules
    string status
  }

  STUDENTS ||--o{ ENROLLMENTS : has
  COURSES ||--o{ ENROLLMENTS : includes
  STUDENTS ||--o{ LEARNING_SESSIONS : attends
  COURSES ||--o{ LEARNING_SESSIONS : contains
  LEARNING_SESSIONS ||--o{ COGNITIVE_EVENTS : captures
  STUDENTS ||--o{ ASSESSMENTS : takes
  COURSES ||--o{ ASSESSMENTS : has
  STUDENTS ||--o{ RISK_SCORES : receives
  COURSES ||--o{ RISK_SCORES : tracks
  STUDENTS ||--o{ LEARNING_PATHS : follows
  COURSES ||--o{ LEARNING_PATHS : shapes
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
